<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#fffdf8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ogden 850">
<title>Ogden 850 · 背单词</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="assets/style.css">
</head>
<body class="momo-page">
<main class="momo-app">
  <header class="momo-top">
    <div>
      <div class="momo-brand">Ogden 850</div>
      <div id="deck-subtitle" class="momo-subtitle">Basic English Vocabulary</div>
    </div>
    <a class="momo-link" href="words.html">词库</a>
  </header>

  <section class="momo-progress-card">
    <div class="progress-meta"><span id="progress-text">0 / 0</span><span id="today-mode">今日学习</span></div>
    <div class="learn-bar"><span id="learn-bar-fill"></span></div>
  </section>

  <section class="deck-controls">
    <select id="deck-cat"><option value="">全部分类</option><option value="op">Operations 操作词</option><option value="gt">General Things 一般事物</option><option value="pt">Picturable Things 可画事物</option><option value="qg">Qualities 性质词</option><option value="qo">Opposites 对立词</option></select>
    <select id="deck-size"><option value="20">20 词</option><option value="50">50 词</option><option value="100">100 词</option><option value="850">全部</option></select>
  </section>

  <section class="memory-card" id="memory-card">
    <div class="card-status"><span id="card-category">Category</span><span id="card-state">点击卡片看答案</span></div>
    <button id="speak-word" class="round-speak">▶</button>
    <div id="card-word" class="memory-word">Loading</div>
    <div id="card-ipa" class="memory-ipa"></div>
    <div id="answer-block" class="answer-block hidden">
      <div id="card-zh" class="memory-zh"></div>
      <p id="card-def" class="memory-def"></p>
      <div class="memory-example"><span id="card-example-en"></span><br><small id="card-example-zh"></small></div>
    </div>
  </section>

  <section class="recall-actions">
    <button id="again-btn" class="recall-btn again"><b>忘记</b><span>Again</span></button>
    <button id="hard-btn" class="recall-btn hard"><b>模糊</b><span>Hard</span></button>
    <button id="good-btn" class="recall-btn good"><b>认识</b><span>Good</span></button>
  </section>

  <section class="quick-stats">
    <div><b id="known-count">0</b><span>认识</span></div>
    <div><b id="hard-count">0</b><span>模糊</span></div>
    <div><b id="again-count">0</b><span>忘记</span></div>
  </section>

  <nav class="bottom-tabs">
    <a class="active" href="index.html">学习</a>
    <a href="words.html">词库</a>
    <a href="stats.html">统计</a>
  </nav>
</main>
<script src="assets/app.js"></script>
<script>loadMomoHome()</script>
</body>
</html>
