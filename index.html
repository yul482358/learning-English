<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#fffdf8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ogden 850">
<title>Ogden 850 · 背单词</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<nav class="topnav vocab-nav"><a href="index.html">Learn</a><a href="words.html">Words</a><a href="stats.html">Stats</a></nav>
<main class="container app-container">
<section class="hero vocab-hero"><p class="eyebrow">Ogden Basic English 850</p><h1>背 850 个真正基础的英语词。</h1><p>一张一张翻卡片，听发音，看例句。掌握状态只保存在你的浏览器本地，不再做每日复盘任务。</p></section>
<section class="study-shell">
  <aside class="study-side panel">
    <h2>Study Settings</h2>
    <label>Category</label>
    <select id="study-cat"><option value="">全部分类</option><option value="op">Operations</option><option value="gt">General Things</option><option value="pt">Picturable Things</option><option value="qg">Qualities General</option><option value="qo">Qualities Opposites</option></select>
    <label>Mode</label>
    <select id="study-mode"><option value="all">全部单词</option><option value="new">未标记</option><option value="learning">学习中</option><option value="known">已掌握</option></select>
    <div class="study-actions">
      <button id="shuffle-btn" class="primary-btn">Shuffle</button>
      <button id="reset-filter-btn" class="ghost-btn">Reset</button>
    </div>
    <div id="study-count" class="study-count"></div>
  </aside>
  <section class="flashcard-wrap">
    <article id="flashcard" class="flashcard"></article>
    <div class="flash-actions">
      <button id="prev-card" class="ghost-btn">← Prev</button>
      <button id="speak-card" class="primary-btn">▶ Speak</button>
      <button id="next-card" class="ghost-btn">Next →</button>
    </div>
    <div class="mark-actions">
      <button id="mark-new" class="mark-btn">未标记</button>
      <button id="mark-learning" class="mark-btn learning">学习中</button>
      <button id="mark-known" class="mark-btn known">已掌握</button>
    </div>
  </section>
</section>
</main>
<script src="assets/app.js"></script>
<script>loadVocabHome()</script>
</body>
</html>
